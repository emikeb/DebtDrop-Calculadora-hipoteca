<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Hipotecas Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Input Panel -->
        <div class="glass-panel">
            <h1>Calculadora Hipotecaria</h1>
            <p class="subtitle">Calcula tus cuotas y el total a pagar de forma sencilla.</p>

            <div class="input-group">
                <label for="capital">Capital Inicial</label>
                <div class="input-wrapper">
                    <input type="number" id="capital" placeholder="Ej. 150000" min="1" step="1000">
                    <span>€</span>
                </div>
            </div>

            <div class="input-group">
                <label for="interes">Tasa de Interés Anual</label>
                <div class="input-wrapper">
                    <input type="number" id="interes" placeholder="Ej. 3.5" min="0" step="0.1">
                    <span>%</span>
                </div>
            </div>

            <div class="input-group">
                <label for="plazo">Plazo de Amortización</label>
                <div class="input-wrapper">
                    <input type="number" id="plazo" placeholder="Ej. 30" min="1" step="1">
                    <span>Años</span>
                </div>
            </div>

            <div class="extra-payments-section">
                <div class="extra-payments-header">
                    <label>Pagos Anticipados (Opcional)</label>
                    <button type="button" id="btn-add-extra" class="btn-small">+ Añadir Pago Extra</button>
                </div>
                <div id="extra-payments-container"></div>
            </div>

            <button id="btn-calcular">Añadir a Comparar</button>
            <div id="error-msg" class="error-message"></div>
        </div>

        <!-- Resultados y Comparación Panel -->
        <div class="glass-panel right-panel">
            <h2 class="section-title">Comparación de Hipotecas</h2>
            <div class="chart-container">
                <canvas id="amortizationChart"></canvas>
            </div>
            
            <div id="mortgage-cards-container" class="cards-container">
                <p class="empty-msg" id="empty-msg">Aún no has añadido ninguna hipoteca para comparar.</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
